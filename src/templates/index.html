<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>biritAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }

        :root {
            --cream: #F5EED8;
            --cream-dim: #E8DFC4;
            --amber: #C8922A;
            --amber-light: #E8B84B;
            --ink: #1A1612;
            --ink-mid: #2E2820;
            --ink-soft: #4A4239;
            --muted: #7A6E5F;
            --surface: #231E17;
            --surface-raised: #2E2820;
            --border: rgba(200, 146, 42, 0.2);
            --border-strong: rgba(200, 146, 42, 0.5);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--ink);
            background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200, 146, 42, 0.12) 0%, transparent 70%);
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--cream);
        }

        .display-font { font-family: 'Cormorant Garamond', Georgia, serif; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .tab-link {
            position: relative;
            padding: 14px 4px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            transition: color 0.2s;
            cursor: pointer;
            text-decoration: none;
            user-select: none;
        }
        .tab-link::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 1px;
            background: var(--amber);
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }
        .tab-link.active { color: var(--cream); }
        .tab-link.active::after { transform: scaleX(1); }
        .tab-link:hover:not(.active) { color: var(--cream-dim); }

        .pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
        }
        .pill-amber  { background: rgba(200, 146, 42, 0.18); color: var(--amber-light); border: 1px solid rgba(200, 146, 42, 0.35); }
        .pill-green  { background: rgba(80, 160, 100, 0.15); color: #7DD4A0; border: 1px solid rgba(80, 160, 100, 0.3); }
        .pill-red    { background: rgba(200, 80, 60, 0.15);  color: #F08070; border: 1px solid rgba(200, 80, 60, 0.3); }
        .pill-yellow { background: rgba(220, 180, 60, 0.15); color: #D4B84A; border: 1px solid rgba(220, 180, 60, 0.3); }

        .drink-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 18px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--cream);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .drink-input::placeholder { color: var(--muted); }
        .drink-input:focus {
            border-color: var(--amber);
            background: rgba(255,255,255,0.06);
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: var(--amber);
            color: var(--ink);
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
        }
        .btn-primary:hover { background: var(--amber-light); }
        .btn-primary:active { transform: scale(0.99); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .drink-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 22px;
            transition: border-color 0.2s, background 0.2s;
        }
        .drink-card:hover {
            border-color: var(--border-strong);
            background: rgba(255,255,255,0.05);
        }

        .bookmark-btn {
            background: none;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 7px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            color: var(--muted);
            line-height: 0;
        }
        .bookmark-btn:hover {
            border-color: var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--cream);
        }
        .bookmark-btn.saved { color: var(--amber); }

        .match-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 7px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--cream-dim);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 28px 0;
        }

        .prob-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
        }
        .prob-badge .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
        }

        .empty-state {
            padding: 48px 24px;
            text-align: center;
            border: 1px dashed var(--border);
            border-radius: 12px;
        }

        .count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            font-size: 10px;
            font-weight: 500;
            background: rgba(200, 146, 42, 0.25);
            color: var(--amber-light);
            margin-left: 6px;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(200,146,42,0.3);
            border-top-color: var(--amber);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    </style>
</head>
<body>

    <div
        x-data="{
            tab: 'search',
            bookmarks: [],
            searchResults: [],
            ingredientInput: '',
            loading: false,
            error: null,
            probability: null,
            init() {
                const saved = localStorage.getItem('drinkBookmarks_v2');
                this.bookmarks = saved ? JSON.parse(saved) : [];
            },
            async suggest() {
                const ingredients = this.ingredientInput.split(',').map(s => s.trim()).filter(Boolean);
                if (!ingredients.length) return;
                this.loading = true;
                this.error = null;
                this.searchResults = [];
                this.probability = null;
                try {
                    const res = await fetch('/suggest', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ingredients })
                    });
                    if (!res.ok) throw new Error('Request failed (' + res.status + ')');
                    const data = await res.json();
                    this.searchResults = data.similar_drinks || [];
                    this.probability = data.probability ?? null;
                } catch (e) {
                    this.error = e.message;
                } finally {
                    this.loading = false;
                }
            },
            toggleBookmark(drink) {
                if (!drink || !drink.name) return;
                const index = this.bookmarks.findIndex(b => b.name === drink.name);
                if (index > -1) {
                    this.bookmarks.splice(index, 1);
                } else {
                    this.bookmarks.push(drink);
                }
                localStorage.setItem('drinkBookmarks_v2', JSON.stringify(this.bookmarks));
            },
            isBookmarked(drinkName) {
                return this.bookmarks.some(b => b.name === drinkName);
            }
        }"
        x-init="init()"
        class="w-full max-w-xl mx-auto py-12 px-4"
    >

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="display-font text-5xl font-semibold" style="color: var(--cream); line-height: 1.1;">birit<span style="color: var(--amber);">AI</span></h1>
            <p class="mt-3 text-sm" style="color: var(--muted);">Enter what you have. We'll find what to make.</p>
        </div>

        <!-- Main card -->
        <div class="card" style="padding: 32px 36px;">

            <!-- Tab Nav -->
            <div class="flex gap-8 mb-8" style="border-bottom: 1px solid var(--border);">
                <a @click.prevent="tab = 'search'"
                   :class="tab === 'search' ? 'active' : ''"
                   class="tab-link">
                    Suggest
                </a>
                <a @click.prevent="tab = 'bookmarks'"
                   :class="tab === 'bookmarks' ? 'active' : ''"
                   class="tab-link" style="display:flex; align-items:center;">
                    Saved
                    <span x-show="bookmarks.length > 0" x-text="bookmarks.length" class="count-badge"></span>
                </a>
            </div>

            <!-- Search Tab -->
            <div x-show="tab === 'search'">

                <div class="mb-6">
                    <label for="ingredients" class="block mb-2 text-xs tracking-widest uppercase" style="color: var(--muted);">Your ingredients</label>
                    <input
                        type="text"
                        id="ingredients"
                        x-model="ingredientInput"
                        @keydown.enter="suggest()"
                        class="drink-input"
                        placeholder="vodka, lime juice, ginger beer…"
                    >
                    <button
                        @click="suggest()"
                        :disabled="loading"
                        class="btn-primary mt-4"
                        style="display: flex; align-items: center; justify-content: center; gap: 10px;"
                    >
                        <span x-show="loading" class="spinner"></span>
                        <span x-text="loading ? 'Finding drinks…' : 'Find Drinks'"></span>
                    </button>
                </div>

                <!-- Error -->
                <div x-show="error" x-cloak class="mb-4 px-4 py-3 rounded-lg text-sm" style="background: rgba(200,80,60,0.1); border: 1px solid rgba(200,80,60,0.25); color: #F08070;" x-text="error"></div>

                <!-- Results -->
                <div x-show="searchResults.length > 0 || probability !== null" x-cloak>

                    <hr class="divider">

                    <!-- Cocktail probability -->
                    <div x-show="probability !== null" class="mb-6">
                        <p class="text-xs tracking-widest uppercase mb-3" style="color: var(--muted);">Cocktail likelihood</p>
                        <div class="prob-badge"
                             :style="probability < 0.5
                                ? 'background: rgba(200,80,60,0.1); border: 1px solid rgba(200,80,60,0.25);'
                                : 'background: rgba(80,160,100,0.1); border: 1px solid rgba(80,160,100,0.25);'">
                            <span class="dot" :style="probability < 0.5 ? 'background: #F08070;' : 'background: #7DD4A0;'"></span>
                            <span :style="probability < 0.5 ? 'color: #F08070; font-weight:500;' : 'color: #7DD4A0; font-weight:500;'"
                                  x-text="Math.round(probability * 100) + '%'"></span>
                            <span style="color: var(--muted); font-size:12px;"
                                  x-text="probability < 0.5 ? '— unlikely to be a known cocktail' : '— likely a recognisable cocktail'"></span>
                        </div>
                    </div>

                    <!-- Suggested drinks -->
                    <p class="display-font text-2xl mb-5" style="color: var(--cream);">Suggested drinks</p>

                    <div class="space-y-3">
                        <template x-for="(drink, index) in searchResults" :key="index">
                            <div class="drink-card">

                                <div class="flex items-start justify-between mb-3">
                                    <div>
                                        <p class="display-font text-xl font-semibold" style="color: var(--cream); line-height:1.2;" x-text="drink.name"></p>
                                        <span class="pill pill-amber mt-1.5" x-text="(drink.similarity * 100).toFixed(1) + '% match'"></span>
                                    </div>
                                    <button
                                        @click="toggleBookmark(drink)"
                                        title="Save drink"
                                        :class="isBookmarked(drink.name) ? 'bookmark-btn saved' : 'bookmark-btn'"
                                    >
                                        <svg x-show="!isBookmarked(drink.name)" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                        </svg>
                                        <svg x-show="isBookmarked(drink.name)" x-cloak width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                        </svg>
                                    </button>
                                </div>

                                <div x-show="drink.ingredient_matches && drink.ingredient_matches.length > 0" class="flex flex-wrap gap-2 mb-3">
                                    <template x-for="match in drink.ingredient_matches" :key="match.user_ingredient + match.matched_ingredient">
                                        <div x-show="match.score < 100" class="match-chip">
                                            <span x-text="match.user_ingredient" style="color: var(--cream);"></span>
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); flex-shrink:0;">
                                                <path d="M5 12h14M13 6l6 6-6 6"/>
                                            </svg>
                                            <span x-text="match.matched_ingredient" style="color: var(--muted);"></span>
                                            <span class="pill"
                                                  :class="{
                                                    'pill-green':  match.score > 85,
                                                    'pill-yellow': match.score > 70 && match.score <= 85,
                                                    'pill-red':    match.score <= 70
                                                  }"
                                                  style="font-size:10px; padding: 1px 7px;"
                                                  x-text="Math.round(match.score) + '%'">
                                            </span>
                                        </div>
                                    </template>
                                </div>

                                <p class="text-xs" style="color: var(--muted); line-height: 1.6;">
                                    <span x-text="drink.ingredients.join(' · ')"></span>
                                </p>

                            </div>
                        </template>
                    </div>

                </div>
            </div>

            <!-- Bookmarks Tab -->
            <div x-show="tab === 'bookmarks'" x-cloak>
                <p class="display-font text-2xl mb-5" style="color: var(--cream);">Saved drinks</p>

                <div x-show="bookmarks.length === 0" class="empty-state">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); margin: 0 auto 12px;">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p class="text-sm" style="color: var(--muted);">No saved drinks yet.</p>
                    <p class="text-xs mt-1" style="color: var(--muted); opacity: 0.6;">Tap the bookmark icon on any suggestion.</p>
                </div>

                <div class="space-y-3">
                    <template x-for="drink in bookmarks" :key="drink.name">
                        <div class="drink-card">
                            <div class="flex items-start justify-between mb-2">
                                <p class="display-font text-xl font-semibold" style="color: var(--cream); line-height:1.2;" x-text="drink.name"></p>
                                <button @click="toggleBookmark(drink)" title="Remove" class="bookmark-btn saved">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                    </svg>
                                </button>
                            </div>
                            <p class="text-xs" style="color: var(--muted); line-height: 1.6;">
                                <span x-text="Array.isArray(drink.ingredients) ? drink.ingredients.join(' · ') : ''"></span>
                            </p>
                        </div>
                    </template>
                </div>
            </div>

        </div>

        <p class="text-center mt-6 text-xs" style="color: var(--muted); opacity: 0.5; letter-spacing: 0.06em;">
            Drink responsibly
        </p>

    </div>
</body>
</html>
